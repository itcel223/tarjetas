<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>Invitación Digital · Nuestro Evento</title>
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: #faf6f0;
            background-image: url("gaelica11-flowers-4931217_1280.png");
            color: #2e241f;
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem 1.2rem;
        }

        /* cuenta regresiva */
        .countdown-strip {
            background: #b76e79;
            color: white;
            padding: 0.9rem 1rem;
            text-align: center;
            border-radius: 60px;
            margin-bottom: 2rem;
            box-shadow: 0 6px 14px rgba(0,0,0,0.08);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 1.2rem 2rem;
            font-weight: 500;
        }

        .countdown-item {
            display: flex;
            align-items: baseline;
            gap: 0.3rem;
        }

        .countdown-num {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1;
            min-width: 2.4rem;
            text-align: center;
        }

        .countdown-label {
            font-size: 0.95rem;
            text-transform: uppercase;
            opacity: 0.85;
        }

        /* encabezado */
        .hero {
            text-align: center;
            margin: 1.5rem 0 2.5rem;
        }

        .hero h1 {
            font-size: clamp(2.2rem, 8vw, 3.8rem);
            font-family: 'Times New Roman', serif;
            color: #3b2b23;
            margin-bottom: 0.4rem;
        }

        .hero .date-badge {
            background: #e8d9d1;
            padding: 0.5rem 1.8rem;
            display: inline-block;
            border-radius: 40px;
            font-size: 1.3rem;
            font-weight: 500;
            margin: 0.5rem 0;
        }

        .hero .location {
            font-size: 1.2rem;
            color: #5f4c41;
        }

        .separator {
            width: 80px;
            height: 2px;
            background: #dbb8a7;
            margin: 2rem auto;
        }

        .section-title {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            font-weight: 400;
            border-bottom: 2px solid #edd9ce;
            padding-bottom: 0.5rem;
            display: inline-block;
        }

        /* galería */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1.2rem;
            margin: 2rem 0;
        }

        .gallery-item {
            background: #e1cfc2;
            border-radius: 18px;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            box-shadow: 0 8px 18px rgba(0,0,0,0.05);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* mapa */
        .map-container {
            margin: 2rem 0 2.5rem;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 1px solid #e2d2c5;
        }

        .map-placeholder iframe {
            width: 100%;
            height: 350px;
            border: 0;
            display: block;
        }

        /* formulario RSVP */
        .rsvp-form {
            background: #fffbf8;
            padding: 2rem 1.8rem;
            border-radius: 32px;
            box-shadow: 0 8px 22px rgba(0,0,0,0.04);
            margin: 2.5rem 0;
            border: 1px solid #f0e2d8;
        }

        .form-row {
            margin-bottom: 1.5rem;
        }

        label {
            font-weight: 500;
            display: block;
            margin-bottom: 0.4rem;
            color: #3e2e26;
        }

        input, select, textarea {
            width: 100%;
            padding: 0.9rem 1.2rem;
            border: 1.5px solid #ebdbd1;
            border-radius: 50px;
            font-size: 1rem;
            background: white;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #b76e79;
        }

        button {
            background: #b76e79;
            color: white;
            border: none;
            padding: 1rem 2.2rem;
            font-size: 1.2rem;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
            width: 100%;
            max-width: 300px;
            margin: 0.5rem auto 0;
            display: block;
        }

        button:hover {
            background: #9e5b64;
        }

        .success-message {
            text-align: center;
            background: #daf4e3;
            padding: 0.8rem;
            border-radius: 60px;
            color: #1f6e43;
            margin-top: 1rem;
            display: none;
        }

        .footer-note {
            text-align: center;
            opacity: 0.7;
            font-size: 0.9rem;
            margin: 2rem 0 0.5rem;
        }

        @media (max-width: 600px) {
            .countdown-num {
                font-size: 1.5rem;
                min-width: 1.8rem;
            }
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- CUENTA REGRESIVA -->
    <div class="countdown-strip" id="countdown">
        <div class="countdown-item">
            <span class="countdown-num" id="days">00</span>
            <span class="countdown-label">días</span>
        </div>
        <div class="countdown-item">
            <span class="countdown-num" id="hours">00</span>
            <span class="countdown-label">horas</span>
        </div>
        <div class="countdown-item">
            <span class="countdown-num" id="minutes">00</span>
            <span class="countdown-label">min</span>
        </div>
        <div class="countdown-item">
            <span class="countdown-num" id="seconds">00</span>
            <span class="countdown-label">seg</span>
        </div>
        <div style="font-size:1.1rem;">⏳ para el gran día</div>
    </div>

    <!-- INFORMACIÓN DEL EVENTO (EDITAR AQUÍ) -->
    <div class="hero">
        <h1 id="event-title">¡Celebramos juntos!</h1>
        <div class="date-badge" id="event-date">Sábado 15 de Octubre, 2025 · 18:00 hs</div>
        <div class="location" id="event-place">
            <i class="fas fa-map-pin"></i> Jardín Magnolias, Av. Central 123, Ciudad
        </div>
    </div>

    <div class="separator"></div>

    <!-- GALERÍA DE FOTOS (EDITAR URLs EN LOS src) -->
    <h2 class="section-title"><i class="fas fa-images"></i> Galería</h2>
    <div class="gallery-grid" id="gallery">
        <div class="gallery-item"><img src="https://placehold.co/400x400/f0e1d8/9b7b6e?text=Foto+1" alt="Foto 1" loading="lazy"></div>
        <div class="gallery-item"><img src="https://placehold.co/400x400/ddcdc0/7e5e50?text=Foto+2" alt="Foto 2" loading="lazy"></div>
        <div class="gallery-item"><img src="https://placehold.co/400x400/e3cfc2/8c6b5c?text=Foto+3" alt="Foto 3" loading="lazy"></div>
        <div class="gallery-item"><img src="https://placehold.co/400x400/dbc6b8/9d7b6b?text=Foto+4" alt="Foto 4" loading="lazy"></div>
        <div class="gallery-item"><img src="https://placehold.co/400x400/cfb7a7/af8a78?text=Foto+5" alt="Foto 5" loading="lazy"></div>
        <div class="gallery-item"><img src="https://placehold.co/400x400/f2dfd3/8f6b5b?text=Foto+6" alt="Foto 6" loading="lazy"></div>
    </div>

    <div class="separator"></div>

    <!-- MAPA (EDITAR src DEL IFRAME) -->
    <h2 class="section-title"><i class="fas fa-map"></i> Ubicación</h2>
    <div class="map-container" id="map">
        <div class="map-placeholder">
            <iframe src="https://www.openstreetmap.org/export/embed.html?bbox=-60.1468849182129%2C-28.712352639031153%2C-60.03650665283204%2C-28.663561662214416&amp;layer=mapnik" style="border: 1px solid black"></iframe>
        </div>
    </div>
    <p style="text-align: center; margin-bottom: 2rem;">
        <span id="map-address">Jardín Magnolias, Ciudad (frente al lago)</span>
    </p>

    <!-- FORMULARIO RSVP -->
    <h2 class="section-title"><i class="fas fa-envelope-open-text"></i> Confirma tu asistencia</h2>
    <div class="rsvp-form">
        <form id="rsvpForm" onsubmit="event.preventDefault(); rsvpConfirm();">
            <div class="form-row">
                <label for="name">Nombre completo *</label>
                <input type="text" id="name" placeholder="Ej. Ana Pérez" required>
            </div>
            <div class="form-row">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" placeholder="tucorreo@ejemplo.com">
            </div>
            <div class="form-row">
                <label for="guests">Acompañantes</label>
                <select id="guests">
                    <option value="0">Solo yo</option>
                    <option value="1">1 acompañante</option>
                    <option value="2">2 acompañantes</option>
                    <option value="3">3 acompañantes</option>
                    <option value="4">4 o más</option>
                </select>
            </div>
            <div class="form-row">
                <label for="message">Mensaje (opcional)</label>
                <textarea id="message" rows="2" placeholder="Alergias, silla de ruedas..."></textarea>
            </div>
            <button type="submit">Enviar confirmación</button>
            <div id="rsvpSuccess" class="success-message">¡Gracias por confirmar! Te esperamos 💫</div>
        </form>
    </div>

</div>

<script>
    // ========== CUENTA REGRESIVA (EDITAR FECHA AQUÍ) ==========
    const eventDate = new Date('Oct 15, 2026 18:00:00').getTime();  // <--- CAMBIA ESTA FECHA

    function updateCountdown() {
        const now = new Date().getTime();
        const distance = eventDate - now;
        if (distance < 0) {
            document.getElementById('days').innerText = '00';
            document.getElementById('hours').innerText = '00';
            document.getElementById('minutes').innerText = '00';
            document.getElementById('seconds').innerText = '00';
            return;
        }
        document.getElementById('days').innerText = Math.floor(distance / (1000*60*60*24)).toString().padStart(2,'0');
        document.getElementById('hours').innerText = Math.floor((distance % (1000*60*60*24)) / (1000*60*60)).toString().padStart(2,'0');
        document.getElementById('minutes').innerText = Math.floor((distance % (1000*60*60)) / (1000*60)).toString().padStart(2,'0');
        document.getElementById('seconds').innerText = Math.floor((distance % (1000*60)) / 1000).toString().padStart(2,'0');
    }
    updateCountdown();
    setInterval(updateCountdown, 1000);

    function rsvpConfirm() {
        if (!document.getElementById('name').value.trim()) {
            alert('Por favor ingresa tu nombre.');
            return;
        }
        const msg = document.getElementById('rsvpSuccess');
        msg.style.display = 'block';
        setTimeout(() => msg.style.display = 'none', 4000);
        document.getElementById('rsvpForm').reset();
    }
</script>
</body>
</html>
